name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint lexical (vocabulaire + verrou assurance) — bloquant
        run: npm run lint:lexique
      - run: npm run lint
      - run: npx prisma generate
      - run: npm run build
